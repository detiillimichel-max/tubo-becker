      <button id="undo" class="flex flex-col items-center gap-1.5 active:scale-95 transition">
        <div class="w-[56px] h-[56px] rounded-full bg-[#1c2e] shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_4px_12px_rgba(0,0,0,0.5)] flex items-center justify-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" opacity="0.9"><path d="M9 14L4 9l5-5"></path><path d="M4 9h10.5A4.5 4.5 0 0 1 19 13.5V19"></path></svg>
        </div>
        <span class="text-[13px] opacity-70">Desfazer</span>
      </button>

      <!-- + Tubo -->
      <button id="add-tube" class="relative -mb-2 active:scale-95 transition">
        <div class="w-[72px] h-[72px] rounded-full bg-gradient-to-b from-[#7b5cff] to-[#5a3fe0] shadow-[0_8px_20px_rgba(91,63,224,0.5),inset_0_1px_0_rgba(255,255,255,0.2)] flex items-center justify-center text-[36px] font-light">+</div>
        <div id="add-lock" class="absolute inset-0 rounded-full bg-[#0f0f1f]/80 backdrop-blur-[1px] flex items-center justify-center" style="display: flex;">
          <span class="text-xl">🔒</span>
        </div>
        <span class="block text-[13px] opacity-70 mt-1.5">tubo</span>
      </button>

      <!-- Dica -->
      <button id="hint" class="flex flex-col items-center gap-1.5 active:scale-95 transition">
        <div class="w-[56px] h-[56px] rounded-full bg-[#1c1c2e] shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_4px_12px_rgba(0,0,0,0.5)] flex items-center justify-center relative">
          <span class="text-[26px]">💡</span>
          <span id="hint-count" class="absolute -top-1 -right-1 min-w-[22px] h-[22px] px-1 rounded-full bg-[#ff7a00] text-[12px] font-bold flex items-center justify-center shadow-lg shadow-orange-900/50 border-2 border-[#0f0f1f]">20</span>
        </div>
        <span class="text-[13px] opacity-70">Dica</span>
      </button>
    </div>
  </div>

  <!-- Popup -->
  <div id="popup" class="fixed inset-0 bg-black/80 backdrop-blur-md items-center justify-center z-50 p-6 hidden">
    <div class="bg-[#18182b] border border-white/10 rounded-[32px] p-8 w-full max-w-[300px] text-center shadow-[0_20px_60px_rgba(0,0,0,0.7)] scale-95 opacity-0 transition-all duration-300" id="popup-card" style="opacity: 0; transform: scale(0.95);">
      <div id="popup-emoji" class="text-[56px] mb-3 leading-none">✨</div>
      <h2 id="popup-title" class="text-[24px] font-bold mb-2">Nível Completo!</h2>
      <p id="popup-text" class="text-[15px] leading-snug opacity-80">Você avançou para o nível 2</p>
    </div>
  </div>

<script>
const COLORS = {
  red: 'linear-gradient(180deg,#ff5f5f 0%,#e22 100%)',
  orange: 'linear-gradient(180deg,#ff9d3f 0%,#f97316 100%)',
  yellow: 'linear-gradient(180deg,#ffde59 0%,#eab308 100%)',
  green: 'linear-gradient(180deg,#4ade80 0%,#16a34a 100%)',
  blue: 'linear-gradient(180deg,#60a5fa 0%,#2563eb 100%)',
  purple: 'linear-gradient(180deg,#b47aff 0%,#7c3aed 100%)',
  pink: 'linear-gradient(180deg,#ff7ac1 0%,#db2777 100%)',
  cyan: 'linear-gradient(180deg,#22e0e0 0%,#0891b2 100%)',
  lime: 'linear-gradient(180deg,#b6f052 0%,#65a30d 100%)',
  teal: 'linear-gradient(180deg,#2dd4bf 0%,#0d9488 100%)'
};

// NÍVEL 1 EXATO DO SCREENSHOT
const LEVELS = [
  [ // 1
    ['green','red','orange'],
    ['blue','orange','green','orange'],
    ['blue','red','yellow'],
    ['blue','yellow','green','green'],
    ['blue','yellow'],
    ['red'],
    ['orange'],
    []
  ],
  [ // 2
    ['purple','red','blue','green'],
    ['yellow','purple','red','blue'],
    ['green','yellow','purple','red'],
    ['blue','green','yellow'],
    ['red','purple'],
    ['yellow','blue'],
    ['green'],
    []
  ],
  [ // 3
    ['orange','blue','red','green'],
    ['yellow','orange','blue','red'],
    ['green','yellow','orange','blue'],
    ['red','green','yellow','orange'],
    ['blue','red'],
    ['green','yellow'],
    [],
    []
  ],
  [ // 4
    ['pink','cyan','purple','red'],
    ['blue','pink','cyan','purple'],
    ['red','blue','pink','cyan'],
    ['purple','red','blue','pink'],
    ['cyan','purple'],
    ['red','blue'],
    [],
    []
  ],
  [ // 5
    ['lime','teal','orange','purple'],
    ['green','lime','teal','orange'],
    ['purple','green','lime','teal'],
    ['orange','purple','green','lime'],
    ['teal','orange'],
    ['purple','green'],
    [],
    []
  ],
  [ // 6
    ['red','yellow','blue','green'],
    ['orange','red','yellow','blue'],
    ['green','orange','red','yellow'],
    ['blue','green','orange','red'],
    ['yellow','blue'],
    ['green','orange'],
    [],
    []
  ],
  [ // 7
    ['purple','pink','cyan','blue'],
    ['yellow','purple','pink','cyan'],
    ['blue','yellow','purple','pink'],
    ['cyan','blue','yellow','purple'],
    ['pink','cyan'],
    ['yellow','blue'],
    [],
    []
  ],
  [ // 8
    ['green','red','orange','teal'],
    ['lime','green','red','orange'],
    ['teal','lime','green','red'],
    ['orange','teal','lime','green'],
    ['red','orange'],
    ['lime','teal'],
    [],
    []
  ],
  [ // 9
    ['blue','purple','yellow','pink'],
    ['cyan','blue','purple','yellow'],
    ['pink','cyan','blue','purple'],
    ['yellow','pink','cyan','blue'],
    ['purple','yellow'],
    ['pink','cyan'],
    [],
    []
  ],
  [ // 10
    ['red','blue','green','yellow'],
    ['orange','red','blue','green'],
    ['yellow','orange','red','blue'],
    ['green','yellow','orange','red'],
    ['blue','green'],
    ['yellow','orange'],
    [],
    []
  ]
];

let state = {
  level: 1,
  hints: 10,
  lives: 5,
  tube8Unlocked: false,
  tubes: [],
  selected: null,
  history: [],
  moves: 0
};

function loadState(){
  const s = localStorage.getItem('watersort-br-v3');
  if(s){
    const d = JSON.parse(s);
    state.level = d.level||1;
    state.hints = d.hints??10;
    state.lives = d.lives??5;
    state.tube8Unlocked = d.tube8Unlocked||false;
  }
}
function save(){
  localStorage.setItem('watersort-br-v3', JSON.stringify({
    level: state.level,
    hints: state.hints,
    lives: state.lives,
    tube8Unlocked: state.tube8Unlocked
  }));
}

function loadLevel(){
  state.history = [];
  state.selected = null;
  state.moves = 0;
  if(state.level <= 10){
    state.tubes = JSON.parse(JSON.stringify(LEVELS[state.level-1]));
  } else {
    state.tubes = generateLevel(state.level);
  }
  // garante 8 tubos
  while(state.tubes.length < 8) state.tubes.push([]);
  render();
  save();
}

function generateLevel(lv){
  const colors = ['red','blue','green','yellow','orange','purple','pink','cyan','lime','teal'];
  const num = 6;
  const pick = colors.sort(()=>Math.random()-0.5).slice(0,num);
  let tubes = Array(8).fill(0).map(()=>[]);
  for(let i=0;i<num;i++) tubes[i]=Array(4).fill(pick[i]);
  for(let k=0;k<120+lv*2;k++){
    const moves=[];
    for(let a=0;a<8;a++)for(let b=0;b<8;b++)if(a!==b){
      const fa=tubes[a], tb=tubes[b];
      if(!fa.length||tb.length>=4)continue;
      const c=fa[fa.length-1];
      if(!tb.length||tb[tb.length-1]===c) moves.push([a,b]);
    }
    if(!moves.length)continue;
    const [a,b]=moves[Math.floor(Math.random()*moves.length)];
    const fa=tubes[a], tb=tubes[b];
    const c=fa[fa.length-1];
    let cnt=0; for(let i=fa.length-1;i>=0&&fa[i]===c;i--) cnt++;
    const pour=Math.min(cnt,4-tb.length,1+Math.floor(Math.random()*2));
    for(let i=0;i<pour;i++) tb.push(fa.pop());
  }
  return tubes;
}

function canPour(a,b){
  if(a===b) return false;
  if(a===7 && !state.tube8Unlocked) return false;
  if(b===7 && !state.tube8Unlocked) return false;
  const fa=state.tubes[a], tb=state.tubes[b];
  if(!fa.length) return false;
  if(tb.length>=4) return false;
  const c=fa[fa.length-1];
  return tb.length===0 || tb[tb.length-1]===c;
}

function doPour(a,b){
  const fa=[...state.tubes[a]], tb=[...state.tubes[b]];
  const c=fa[fa.length-1];
  let cnt=0; for(let i=fa.length-1;i>=0&&fa[i]===c;i--) cnt++;
  const pour=Math.min(cnt,4-tb.length);
  state.history.push(state.tubes.map(t=>[...t]));
  for(let i=0;i<pour;i++) tb.push(fa.pop());
  state.tubes[a]=fa; state.tubes[b]=tb;
  state.selected=null; state.moves++;
  render(); save();
  setTimeout(checkWin,350);
}

function onTubeClick(i){
  const tubeEl = document.querySelectorAll('.tube')[i];
  if(i===7 && !state.tube8Unlocked){ tubeEl.classList.add('shake'); setTimeout(()=>tubeEl.classList.remove('shake'),400); return; }
  if(state.selected===null){
    if(!state.tubes[i].length) return;
    state.selected=i; render(); navigator.vibrate?.(10);
  } else {
    if(state.selected===i){ state.selected=null; render(); return; }
    if(canPour(state.selected,i)){
      doPour(state.selected,i);
      navigator.vibrate?.(15);
    } else {
      tubeEl.classList.add('shake');
      setTimeout(()=>tubeEl.classList.remove('shake'),400);
      if(state.tubes[i].length) state.selected=i; else state.selected=null;
      render();
    }
  }
}

function checkWin(){
  const active = state.tubes.filter((t,idx)=> !(idx===7 && !state.tube8Unlocked));
  const nonEmpty = active.filter(t=>t.length>0);
  const colors = new Set(active.flat());
  const allSingle = nonEmpty.every(t=> t.every(c=>c===t[0]));
  if(allSingle && nonEmpty.length===colors.size && state.moves>0){
    state.hints += 10;
    if(state.level===10 && !state.tube8Unlocked){
      state.tube8Unlocked = true;
      state.lives = 99;
      state.hints += 50;
      showPopup('PARABÉNS!','Tubo extra desbloqueado + 99 vidas + 50 dicas!','🎉');
    } else if(state.level<10){
      showPopup('Nível Completo!',`Você avançou para o nível ${state.level+1}`,'✨');
    } else {
      showPopup('Incrível!','Próximo nível gerado','🚀');
    }
    state.level++;
    save();
    setTimeout(loadLevel,1500);
  }
}

function render(){
  document.getElementById('level').textContent = state.level;
  document.getElementById('hint-count').textContent = state.hints;
  document.getElementById('add-lock').style.display = state.tube8Unlocked ? 'none':'flex';
  const wrap = document.getElementById('tubes');
  wrap.innerHTML='';
  state.tubes.forEach((tube,idx)=>{
    const locked = idx===7 && !state.tube8Unlocked;
    const el=document.createElement('div');
    el.className='tube relative w-[74px] h-[158px] sm:w-[82px] sm:h-[176px] cursor-pointer transition-transform duration-200';
    if(state.selected===idx) el.classList.add('selected');
    el.dataset.idx=idx;
    el.innerHTML=`
      <div class="absolute inset-0">
        <div class="absolute inset-0 rounded-[14px] rounded-b-[30px] bg-gradient-to-b from-white/[0.08] to-transparent"></div>
        <div class="absolute inset-0 rounded-[14px] rounded-b-[30px] border-[3px] border-white/12 shadow-[inset_0_0_18px_rgba(0,0,0,0.6)]"></div>
        <div class="absolute inset-[3px] top-[10px] bottom-[3px] rounded-[10px] rounded-b-[26px] bg-[#0a0a14]/80 overflow-hidden">
          <div class="absolute inset-0 flex flex-col-reverse justify-start gap-[3px] p-[4px]" data-liquid></div>
        </div>
      </div>
      ${locked?`<div class="absolute inset-0 z-20 rounded-[14px] rounded-b-[30px] bg-[#0f0f1f]/85 backdrop-blur-[3px] border-[3px] border-white/10 flex items-center justify-center"><div class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center text-[22px] shadow-inner">🔒</div></div>`:''}
    `;
    const liquids = el.querySelector('[data-liquid]');
    [...tube].reverse().forEach((c,i)=>{
      // render bottom to top, but we reversed
    });
    // render bottom up
    for(let i=0;i<4;i++){
      const layer=document.createElement('div');
      layer.className='w-full h-[34px] sm:h-[38px] rounded-[7px] transition-all duration-300';
      if(i < tube.length){
        const color = tube[i];
        layer.style.background = COLORS[color];
        layer.style.boxShadow='inset 0 2px 0 rgba(255,255,255,0.22), inset 0 -3px 6px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.4)';
      } else {
        layer.style.opacity='0';
      }
      liquids.appendChild(layer);
    }
    el.onclick=()=>onTubeClick(idx);
    wrap.appendChild(el);
  });
}

function showPopup(title,text,emoji){
  const pop=document.getElementById('popup');
  const card=document.getElementById('popup-card');
  document.getElementById('popup-title').textContent=title;
  document.getElementById('popup-text').textContent=text;
  document.getElementById('popup-emoji').textContent=emoji;
  pop.classList.remove('hidden'); pop.classList.add('flex');
  setTimeout(()=>{ card.style.opacity='1'; card.style.transform='scale(1)'; },10);
  setTimeout(()=>{
    card.style.opacity='0'; card.style.transform='scale(0.95)';
    setTimeout(()=>{ pop.classList.add('hidden'); pop.classList.remove('flex'); },300);
  },1800);
}

// Controls
document.getElementById('undo').onclick=()=>{
  if(state.history.length){
    state.tubes = state.history.pop();
    state.selected=null;
    render(); save();
    navigator.vibrate?.(10);
  }
};
document.getElementById('hint').onclick=()=>{
  if(state.hints<=0){ showPopup('Sem dicas','Complete níveis para ganhar mais','💡'); return; }
  // procura jogada válida que ajuda
  let best=null;
  outer: for(let a=0;a<8;a++) for(let b=0;b<8;b++) if(canPour(a,b)){
    const fa=state.tubes[a], tb=state.tubes[b];
    const c=fa[fa.length-1];
    // prioriza completar cor
    if(tb.length && tb[tb.length-1]===c){ best=[a,b]; break outer; }
    if(!best) best=[a,b];
  }
  if(best){
    state.hints--; doPour(best[0],best[1]);
  }
};
document.getElementById('add-tube').onclick=()=>{
  if(!state.tube8Unlocked){
    showPopup('Bloqueado','Complete o nível 10 para desbloquear','🔒');
  } else {
    showPopup('Tubo Extra','Você já possui o tubo extra!','✅');
  }
};

// Inicializar
loadState();
loadLevel();

// Previne zoom duplo toque
let last=0;
document.addEventListener('touchend',e=>{ const n=Date.now(); if(n-last<300)e.preventDefault(); last=n; },{passive:false});
</script>

</body></html>
