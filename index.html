<style>
  * { -webkit-tap-highlight-color: transparent; }

  .tube {
    width: 70px; height: 170px;
    border: 3px solid rgba(148,163,184,0.22);
    border-top: 4px solid rgba(148,163,184,0.35);
    border-radius: 14px 14px 34px 34px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(2,6,23,0.8) 60%);
    box-shadow: inset 0 10px 18px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.35), inset 0 -2px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column-reverse; padding: 6px;
    transition: transform .15s ease, box-shadow .2s;
    position: relative;
  }
  .tube:active { transform: scale(0.96); }
  .tube.selected { box-shadow: 0 0 0 3px #22d3ee, 0 0 20px rgba(34,211,238,0.4), inset 0 10px 18px rgba(0,0,0,0.5); }
  .tube.locked { opacity: .35; filter: grayscale(0.8); }
  .tube.locked::after { content:''; position:absolute; inset:0; background: repeating-linear-gradient(-45deg, transparent, transparent 6px, rgba(255,255,255,0.03) 6px, rgba(255,255,255,0.03) 12px); border-radius: inherit; }
  .liquid {
    width: 100%; height: 23.5%;
    margin: 1.2px 0;
    border-radius: 3px 3px 16px 16px;
    box-shadow: inset 0 -4px 8px rgba(0,0,0,0.28), inset 0 3px 3px rgba(255,255,255,0.18), 0 1px 2px rgba(0,0,0,0.2);
    transition: all .28s cubic-bezier(.2,.8,.2,1);
    position: relative;
    overflow: hidden;
  }
  .liquid::after {
    content:''; position:absolute; top:2px; left:4px; right:4px; height:35%;
    background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
    border-radius: 10px; opacity:.7;
  }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
  .shake { animation: shake .35s; }
  @keyframes pop { 0%{transform:scale(.9); opacity:0} 100%{transform:scale(1); opacity:1} }
  .pop { animation: pop .3s ease-out; }

  <!-- Top Bar -->
  <header class="sticky top-0 z-40 backdrop-blur-xl bg-slate-900/70 border-b border-white/5">
    <div class="max-w-[420px] mx-auto px-4 h-[60px] flex items-center justify-between">
      <button class="w-9 h-9 grid place-items-center rounded-xl bg-white/5 border border-white/10">

        <div class="text-[11px] tracking-[0.2em] text-cyan-300/80 font-semibold -mb-1">MÉDIO</div>

      <div id="tubes" class="grid grid-cols-4 gap-x-3 gap-y-6 place-items-center mt-4"><div class="relative"><div class="tube" data-index="0"><div class="liquid" style="background: linear-gradient(rgb(239, 68, 68), rgb(204, 33, 33)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(59, 130, 246), rgb(24, 95, 211)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(34, 197, 94), rgb(0, 162, 59)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(234, 179, 8), rgb(199, 144, 0)); opacity: 1;"></div></div></div><div class="relative"><div class="tube" data-index="1"><div class="liquid" style="background: linear-gradient(rgb(249, 115, 22), rgb(214, 80, 0)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(239, 68, 68), rgb(204, 33, 33)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(59, 130, 246), rgb(24, 95, 211)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(34, 197, 94), rgb(0, 162, 59)); opacity: 1;"></div></div></div><div class="relative"><div class="tube" data-index="2"><div class="liquid" style="background: linear-gradient(rgb(234, 179, 8), rgb(199, 144, 0)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(249, 115, 22), rgb(214, 80, 0)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(239, 68, 68), rgb(204, 33, 33)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(59, 130, 246), rgb(24, 95, 211)); opacity: 1;"></div></div></div><div class="relative"><div class="tube" data-index="3"><div class="liquid" style="background: linear-gradient(rgb(34, 197, 94), rgb(0, 162, 59)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(234, 179, 8), rgb(199, 144, 0)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(249, 115, 22), rgb(214, 80, 0)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(239, 68, 68), rgb(204, 33, 33)); opacity: 1;"></div></div></div><div class="relative"><div class="tube" data-index="4"><div class="liquid" style="background: linear-gradient(rgb(59, 130, 246), rgb(24, 95, 211)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(34, 197, 94), rgb(0, 162, 59)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(234, 179, 8), rgb(199, 144, 0)); opacity: 1;"></div><div class="liquid" style="background: linear-gradient(rgb(249, 115, 22), rgb(214, 80, 0)); opacity: 1;"></div></div></div><div class="relative"><div class="tube" data-index="5"><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div></div></div><div class="relative"><div class="tube" data-index="6"><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div></div></div><div class="relative"><div class="absolute inset-0 grid place-items-center text-2xl z-10 pointer-events-none">🔒</div><div class="tube locked" data-index="7"><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div><div class="liquid" style="opacity: 0;"></div></div></div></div>
    </div>

    <!-- Controls -->
    <div class="mt-auto pt-10">
      <div class="grid grid-cols-3 gap-3">
        <button id="undoBtn" class="group relative bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/80 rounded-[22px] py-3.5 shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_10px_20px_rgba(0,0,0,0.3)] transition active:scale-95" style="opacity: 0.45;">
          <div class="text-[22px] leading-none">↶</div>
          <div class="text-[11px] mt-1 opacity-70 group-active:opacity-100">Desfazer</div>
        </button>
        <button id="hintBtn" class="group relative bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/80 rounded-[22px] py-3.5 shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_10px_20px_rgba(0,0,0,0.3)] transition active:scale-95" style="opacity: 1;">
          <div class="text-[22px] leading-none">💡</div>
          <div class="text-[11px] mt-1 opacity-70">Dica</div>
        </button>
        <button id="restartBtn" class="group relative bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/80 rounded-[22px] py-3.5 shadow-[inset_0_1px_0_rgba(255,255,255,0.05),0_10px_20px_rgba(0,0,0,0.3)] transition active:scale-95">
          <div class="text-[22px] leading-none">↻</div>
          <div class="text-[11px] mt-1 opacity-70">Reiniciar</div>
        </button>
      </div>
      <div class="text-center mt-5 text-[12px] text-slate-500">Toque no tubo para selecionar e despejar</div>
    </div>
  </main>
</div>

<!-- Win Modal -->
<div id="winModal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden items-center justify-center p-6">
  <div class="pop w-full max-w-[320px] bg-gradient-to-b from-slate-800 to-slate-900 rounded-[32px] p-[1px] shadow-2xl">
    <div class="bg-slate-900 rounded-[31px] p-8 text-center">
      <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-b from-amber-400 to-orange-500 grid place-items-center text-3xl shadow-lg shadow-amber-500/20 mb-4">🏆</div>
      <h2 class="text-[26px] font-bold tracking-wide">VOCÊ VENCEU!</h2>
      <p class="mt-3 text-slate-300 leading-snug">+99 vidas e <span class="text-cyan-400 font-semibold">50 dicas bônus</span> liberadas!</p>
      <p class="mt-1 text-[13px] text-slate-500">O 8º tubo foi desbloqueado permanentemente</p>
      <button id="continueBtn" class="mt-6 w-full h-[52px] rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-600 font-semibold tracking-wide shadow-lg shadow-cyan-600/20 active:scale-[0.98] transition">Continuar</button>
    </div>
  </div>
</div>

<script>
const COLORS = {
  green: '#22c55e',
  red: '#ef4444',
  orange: '#f97316',
  blue: '#3b82f6',
  yellow: '#eab308',
  purple: '#a855f7',
  pink: '#ec4899',
  cyan: '#06b6d4',
};
const CAPACITY = 4;

// 10 níveis artesanais
const LEVELS = [
  // Nível 1 - exato
  [
    ['green','red','orange'],
    ['orange','green','orange','blue'],
    ['yellow','red','blue'],
    ['green','green','yellow','blue'],
    ['yellow','blue'],
    ['red'],
    ['orange'],
    []
  ],
  // 2
  [
    ['red','blue','green','yellow'],
    ['orange','red','blue','green'],
    ['yellow','orange','red','blue'],
    ['green','yellow','orange','red'],
    ['blue','green','yellow','orange'],
    [],[],[]
  ],
  // 3
  [
    ['purple','yellow','red','green'],
    ['blue','purple','yellow','blue'],
    ['green','red','purple','yellow'],
    ['red','green','blue','red'],
    ['yellow','blue','green','purple'],
    [],[],[]
  ],
  // 4
  [
    ['orange','blue','pink','cyan'],
    ['yellow','orange','blue','pink'],
    ['cyan','yellow','orange','blue'],
    ['pink','cyan','yellow','orange'],
    ['blue','pink','cyan','yellow'],
    [],[],[]
  ],
  // 5
  [
    ['red','purple','cyan','green'],
    ['orange','red','purple','cyan'],
    ['green','orange','red','purple'],
    ['cyan','green','orange','red'],
    ['purple','cyan','green','orange'],
    [],[],[]
  ],
  // 6
  [
    ['red','blue','green','yellow'],
    ['orange','purple','red','blue'],
    ['green','orange','yellow','purple'],
    ['blue','red','orange','green'],
    ['yellow','purple','blue','red'],
    ['purple','green','orange','yellow'],
    [],[]
  ],
  // 7
  [
    ['red','yellow','blue','orange'],
    ['green','purple','red','yellow'],
    ['blue','orange','green','purple'],
    ['yellow','red','blue','green'],
    ['orange','purple','yellow','red'],
    ['purple','green','orange','blue'],
    [],[]
  ],
  // 8
  [
    ['red','blue','purple','yellow'],
    ['orange','green','red','blue'],
    ['purple','yellow','orange','green'],
    ['blue','red','purple','orange'],
    ['yellow','green','blue','red'],
    ['green','orange','yellow','purple'],
    [],[]
  ],
  // 9
  [
    ['cyan','pink','orange','purple'],
    ['yellow','green','cyan','pink'],
    ['orange','purple','yellow','green'],
    ['pink','cyan','orange','yellow'],
    ['purple','green','pink','cyan'],
    ['green','yellow','purple','orange'],
    [],[]
  ],
  // 10
  [
    ['red','orange','yellow','green'],
    ['blue','purple','red','orange'],
    ['yellow','green','blue','purple'],
    ['green','red','yellow','blue'],
    ['orange','purple','green','red'],
    ['purple','blue','orange','yellow'],
    [],[]
  ],
];

let game = {
  level: 1,
  tubes: [],
  initial: [],
  moves: [],
  hints: 10,
  tube8Unlocked: false,
  bonus: false,
  lives: 5,
};
let selected = null;

const tubesEl = document.getElementById('tubes');
const levelNum = document.getElementById('levelNum');
const hintsDisplay = document.getElementById('hintsDisplay');

function shade(hex, amt){
  let c = hex.substring(1);
  let n = parseInt(c,16);
  let r = (n>>16)+amt, g = ((n>>8)&255)+amt, b = (n&255)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function saveMeta(){
  localStorage.setItem('tubosMagicos', JSON.stringify({
    level: game.level,
    tube8Unlocked: game.tube8Unlocked,
    bonus: game.bonus,
    lives: game.lives
  }));
}
function saveState(){
  localStorage.setItem('tubosMagicos_state', JSON.stringify({
    level: game.level,
    tubes: game.tubes,
    moves: game.moves,
    hints: game.hints,
    initial: game.initial
  }));
  saveMeta();
}
function loadMeta(){
  const m = JSON.parse(localStorage.getItem('tubosMagicos')||'{}');
  game.level = m.level||1;
  game.tube8Unlocked = !!m.tube8Unlocked;
  game.bonus = !!m.bonus;
  game.lives = m.lives||5;
}
function loadState(){
  const s = JSON.parse(localStorage.getItem('tubosMagicos_state')||'null');
  if(s && s.level===game.level){
    game.tubes=s.tubes; game.moves=s.moves; game.hints=s.hints; game.initial=s.initial;
    return true;
  }
  return false;
}

function generateRandomLevel(seed){
  const colorsCount = 6;
  const tubesCount = 8;
  const palette = ['red','blue','green','yellow','orange','purple','pink','cyan'];
  const chosen = palette.sort(()=>Math.random()-0.5).slice(0,colorsCount);
  let tubes = Array.from({length:tubesCount},()=>[]);
  for(let i=0;i<colorsCount;i++) tubes[i]=Array(CAPACITY).fill(chosen[i]);
  let last=null;
  for(let s=0;s<900;s++){
    const moves=[];
    for(let i=0;i<tubesCount;i++){
      if(!tubes[i].length) continue;
      const top=tubes[i][tubes[i].length-1];
      let cnt=1; for(let k=tubes[i].length-2;k>=0&&tubes[i][k]===top;k--) cnt++;
      for(let j=0;j<tubesCount;j++){
        if(i===j) continue;
        if(tubes[j].length>=CAPACITY) continue;
        if(tubes[j].length && tubes[j][tubes[j].length-1]!==top) continue;
        if(last && last.src===j && last.dst===i) continue;
        moves.push({src:i,dst:j,amt:Math.min(cnt, CAPACITY - tubes[j].length)});
      }
    }
    if(!moves.length) continue;
    const mv=moves[Math.floor(Math.random()*moves.length)];
    const top=tubes[mv.src][tubes[mv.src].length-1];
    for(let k=0;k<mv.amt;k++){ tubes[mv.src].pop(); tubes[mv.dst].push(top); }
    last=mv;
  }
  return tubes;
}

function startLevel(lvl){
  game.level=lvl;
  if(!loadState()){
    game.moves=[];
    game.hints = game.bonus ? 60 : 10;
    if(lvl<=10){
      game.tubes = JSON.parse(JSON.stringify(LEVELS[lvl-1]));
    }else{
      game.tubes = generateRandomLevel(lvl);
    }
    while(game.tubes.length<8) game.tubes.push([]);
    game.initial = JSON.parse(JSON.stringify(game.tubes));
  }
  selected=null;
  render();
  saveState();
}

function render(){
  levelNum.textContent = game.level;
  hintsDisplay.textContent = game.hints;
  tubesEl.innerHTML='';
  for(let i=0;i<8;i++){
    const wrap = document.createElement('div');
    wrap.className='relative';
    const tube = document.createElement('div');
    tube.className='tube';
    tube.dataset.index=i;
    if(i===7 && !game.tube8Unlocked){
      tube.classList.add('locked');
      const lock = document.createElement('div');
      lock.className='absolute inset-0 grid place-items-center text-2xl z-10 pointer-events-none';
      lock.innerHTML='🔒';
      wrap.appendChild(lock);
    }
    const data = game.tubes[i]||[];
    for(let l=0;l<CAPACITY;l++){
      const liq = document.createElement('div');
      liq.className='liquid';
      if(l < data.length){
        const col = data[l];
        liq.style.background = `linear-gradient(180deg, ${COLORS[col]}, ${shade(COLORS[col], -35)})`;
        liq.style.opacity='1';
      }else{
        liq.style.opacity='0';
      }
      tube.appendChild(liq);
    }
    tube.addEventListener('click',()=>onTubeClick(i));
    if(selected===i) tube.classList.add('selected');
    wrap.appendChild(tube);
    tubesEl.appendChild(wrap);
  }
  document.getElementById('undoBtn').style.opacity = game.moves.length ? '1':'0.45';
  document.getElementById('hintBtn').style.opacity = game.hints>0 ? '1':'0.45';
}

function canPour(s,d){
  if(s===d) return false;
  if(d===7 && !game.tube8Unlocked) return false;
  const src=game.tubes[s], dst=game.tubes[d];
  if(!src || src.length===0) return false;
  if(dst.length>=CAPACITY) return false;
  const top=src[src.length-1];
  if(dst.length>0 && dst[dst.length-1]!==top) return false;
  return true;
}
function doPour(s,d){
  const src=game.tubes[s], dst=game.tubes[d];
  const top=src[src.length-1];
  let cnt=0; for(let i=src.length-1;i>=0&&src[i]===top;i--) cnt++;
  const amt=Math.min(cnt, CAPACITY - dst.length);
  for(let i=0;i<amt;i++) src.pop();
  for(let i=0;i<amt;i++) dst.push(top);
  game.moves.push({src:s,dst:d,amount:amt});
}

function onTubeClick(idx){
  if(idx===7 && !game.tube8Unlocked) return;
  const tube = game.tubes[idx];
  if(selected===null){
    if(tube.length===0) return;
    selected=idx; render(); return;
  }
  if(selected===idx){ selected=null; render(); return; }
  if(canPour(selected, idx)){
    doPour(selected, idx);
    selected=null;
    render();
    saveState();
    if(checkWin()) setTimeout(handleWin, 300);
  }else{
    const el = document.querySelector(`.tube[data-index="${idx}"]`);
    if(el){ el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),350); }
    selected=null; render();
  }
}

function checkWin(){
  const seen = new Map();
  for(let i=0;i<8;i++){
    if(i===7 && !game.tube8Unlocked) continue;
    const t=game.tubes[i];
    if(t.length===0) continue;
    const first=t[0];
    if(!t.every(c=>c===first)) return false;
    if(seen.has(first)) return false;
    seen.set(first, true);
  }
  return seen.size>0;
}

function handleWin(){
  if(game.level===10 && !game.bonus){
    game.bonus=true;
    game.tube8Unlocked=true;
    game.lives+=99;
    saveMeta();
    document.getElementById('winModal').classList.remove('hidden');
    document.getElementById('winModal').classList.add('flex');
    return;
  }
  showToast('Nível completo!');
  game.level++;
  localStorage.removeItem('tubosMagicos_state');
  saveMeta();
  setTimeout(()=>startLevel(game.level), 800);
}

function undo(){
  if(!game.moves.length) return;
  const mv=game.moves.pop();
  const src=game.tubes[mv.dst], dst=game.tubes[mv.src];
  const top=src[src.length-1];
  for(let i=0;i<mv.amount;i++){ src.pop(); dst.push(top); }
  selected=null; render(); saveState();
}
function findHint(){
  let best=null;
  for(let s=0;s<8;s++){
    if(s===7 && !game.tube8Unlocked) continue;
    const src=game.tubes[s]; if(!src.length) continue;
    const top=src[src.length-1];
    let cnt=0; for(let i=src.length-1;i>=0&&src[i]===top;i--) cnt++;
    for(let d=0;d<8;d++){
      if(!canPour(s,d)) continue;
      const dst=game.tubes[d];
      let score = dst.length===0 ? (src.length===cnt?1:5) : 10;
      if(dst.length>0 && dst.length+Math.min(cnt, CAPACITY-dst.length)===CAPACITY) score=20;
      if(!best || score>best.score) best={src:s,dst:d,score};
    }
  }
  return best;
}
function useHint(){
  if(game.hints<=0) return;
  const h=findHint(); if(!h) return;
  game.hints--;
  const sEl=document.querySelector(`.tube[data-index="${h.src}"]`);
  const dEl=document.querySelector(`.tube[data-index="${h.dst}"]`);
  if(sEl){ sEl.classList.add('selected'); setTimeout(()=>sEl.classList.remove('selected'),600); }
  setTimeout(()=>{ if(dEl){ dEl.classList.add('selected'); setTimeout(()=>dEl.classList.remove('selected'),600);} },350);
  render(); saveState();
  if(navigator.vibrate) navigator.vibrate(20);
}
function restart(){
  if(!confirm('Reiniciar o nível?')) return;
  game.tubes = JSON.parse(JSON.stringify(game.initial));
  game.moves=[]; selected=null; render(); saveState();
}
function showToast(msg){
  const t=document.createElement('div');
  t.className='fixed left-1/2 -translate-x-1/2 bottom-28 bg-emerald-500 text-white px-5 py-2.5 rounded-2xl font-medium shadow-xl z-50 pop';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1300);
}

document.getElementById('undoBtn').onclick=undo;
document.getElementById('hintBtn').onclick=useHint;
document.getElementById('restartBtn').onclick=restart;
document.getElementById('continueBtn').onclick=()=>{
  document.getElementById('winModal').classList.add('hidden');
  document.getElementById('winModal').classList.remove('flex');
  game.level=11;
  localStorage.removeItem('tubosMagicos_state');
  saveMeta();
  startLevel(11);
};

// init
loadMeta();
startLevel(game.level);

// prevent scroll bounce
document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
</script>
